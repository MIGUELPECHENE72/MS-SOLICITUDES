server:
  port: 8081
spring:
  application:
    name: "MS-SOLICITUDES"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: null
adapters:
  r2dbc:
    host: "localhost"
    port: "5432"
    database: "postgres"
    schema: "crediya"
    username: "postgres"
    password: "postgres"
  transaction:
    reactive:
      enabled: true
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
springdoc:
  #packages-to-scan: co.com.bancolombia.api.RouterRest
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
